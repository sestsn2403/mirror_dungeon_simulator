<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.G.O 기프트 목록</title>
  <link rel="stylesheet" href="./ego_gift_style.css" />
</head>
<body>
  <div class="page">
    <h1 class="main-title">E.G.O 기프트 목록</h1>

    <div class="top-control">
      <div class="category-row">
        <div id="categoryTabs" class="category-tabs"></div>
      </div>

      <div class="mode-buttons">
        <div class="mode-buttons">
         <button id="normalBtn" class="mode-btn active">기본 상태</button>
         <button id="plusBtn" class="mode-btn">+강화 상태</button>
          <button id="doublePlusBtn" class="mode-btn">++강화 상태</button>
       </div>
      </div>
     </div>

    <section class="section">
      <div id="sectionTitle" class="section-title"></div>
      <div id="giftArea" class="image-area"></div>
    </section>
  </div>

  <script src="./ego_gift_main.js"></script>
</body>
</html>
